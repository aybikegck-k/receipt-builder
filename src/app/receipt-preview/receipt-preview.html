<div class="preview-wrapper">

  <div class="editor-section">
    <h2>Tasarım Alanı</h2>

    <div
      #editorReceipt
      class="receipt editor-receipt"
      (dragover)="allowDrop($event)"
      (drop)="dropComponent($event)">

      <div
        *ngFor="let item of items"
        class="receipt-item editor-item"
        [class.selected-item]="selectedItem?.id === item.id"
        [style.left.px]="item.x"
        [style.top.px]="item.y"
        (mousedown)="startMove($event, item)">

        <p
          [style.font-size.px]="item.fontSize"
          [style.font-weight]="item.bold ? 'bold' : 'normal'"
          [style.font-style]="item.italic ? 'italic' : 'normal'"
          [style.font-family]="item.fontFamily"
          [style.text-align]="item.align"
          [style.color]="item.color"
          [style.text-decoration]="item.underline ? 'underline' : 'none'"
          [style.background-color]="item.backgroundColor"
          [style.border-width.px]="item.borderWidth"
          [style.border-style]="item.borderStyle"
          [style.border-color]="item.borderColor">

          <ng-container *ngIf="item.type === 'logo'; else normalText">
            <img
              *ngIf="item.imageUrl; else logoPlaceholder"
              [src]="item.imageUrl"
              [style.width.px]="item.logoWidth"
              [style.height.px]="item.logoHeight"
              class="logo-image">
          </ng-container>

          <ng-template #logoPlaceholder>
            {{ item.text }}
          </ng-template>

          <ng-template #normalText>
            {{ item.text }}
          </ng-template>

        </p>

      </div>
    </div>
  </div>

  <div class="final-section">
    <h2>Önizleme</h2>

    <div class="receipt final-receipt">

      <div
        *ngFor="let item of items"
        class="receipt-item preview-item"
        [style.left.px]="item.x"
        [style.top.px]="item.y">

        <p
          [style.font-size.px]="item.fontSize"
          [style.font-weight]="item.bold ? 'bold' : 'normal'"
          [style.font-style]="item.italic ? 'italic' : 'normal'"
          [style.font-family]="item.fontFamily"
          [style.text-align]="item.align"
          [style.color]="item.color"
          [style.text-decoration]="item.underline ? 'underline' : 'none'"
          [style.background-color]="item.backgroundColor"
          [style.border-width.px]="item.borderWidth"
          [style.border-style]="item.borderStyle"
          [style.border-color]="item.borderColor">

          <ng-container *ngIf="item.type === 'logo'; else normalPreviewText">
            <img
              *ngIf="item.imageUrl; else logoPreviewPlaceholder"
              [src]="item.imageUrl"
              [style.width.px]="item.logoWidth"
              [style.height.px]="item.logoHeight"
              class="logo-image">
          </ng-container>

          <ng-template #logoPreviewPlaceholder>
            {{ item.text }}
          </ng-template>

          <ng-template #normalPreviewText>
            {{ item.text }}
          </ng-template>

        </p>

      </div>
    </div>
  </div>

</div>

<!--cdkDropList burayı bırakılabilir alan yapıyor id:receiptList bu alanın adı yani solda verdiğimiz ad aslında bu diyorki ben receiptListe bağlıyım
cdkDropListData : bu drop alanın verisi items dizisi yani appden gelen adisyon bileşenleri
kullanıcı buraya bir şey bırakınca drop() fonksitonu çalışır
 alttaki diz içide olan kod iste ekrana basma kısmı items dizisindeki
 her bileşen için bir kutu oluştur ve içindeki text değerini ekrana yazdır
 
 (click) : Kullanıcı item'a tıklayınca selectItem() çalışır.

[class.selected-item] :
Seçili item ile bu item aynıysa selected-item CSS classını ekler.-->
