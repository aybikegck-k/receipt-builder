<h2>Özellikler</h2>

<div *ngIf="selectedItem; else noSelection">
  <h3>Seçili Bileşen</h3>

  <p><strong></strong> {{ selectedItem.type }}</p>

 <div *ngIf="selectedItem.type === 'Logo'">

  <label>Logo Genişliği:</label>
  <input type="number" [(ngModel)]="selectedItem.logoWidth">

  <label>Logo Yüksekliği:</label>
  <input type="number" [(ngModel)]="selectedItem.logoHeight">

  <button class="delete-btn" (click)="deleteSelectedItem()">Sil</button>

</div>

<!-- ÜRÜNLER AYARLARI -->
<div *ngIf="selectedItem.type === 'Ürünler'">
  

  

  <label>Yazı Boyutu:</label>
  <input
    type="number"
    min="8"
    [(ngModel)]="selectedItem.fontSize"
  >

  <label>Yazı Tipi:</label>
  <select [(ngModel)]="selectedItem.fontFamily">
    <option value="serif">Serif</option>
    <option value="sans-serif">Sans Serif</option>
    <option value="monospace">Monospace</option>
    <option value="cursive">Cursive</option>
  </select>

  <label>
    <input
      type="checkbox"
      [(ngModel)]="selectedItem.bold"
    >
    Kalın
  </label>

  <label>
    <input
      type="checkbox"
      [(ngModel)]="selectedItem.italic"
    >
    İtalik
  </label>


  <label>Yazı Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.color">

    <label>Arka Plan Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.backgroundColor">

    <label>Kenarlık Kalınlığı:</label>
    <input type="number" min="0" [(ngModel)]="selectedItem.borderWidth">

    <label>Kenarlık Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.borderColor">

    <label>Kenarlık Tipi:</label>
    <select [(ngModel)]="selectedItem.borderStyle">
      <option value="solid">Solid</option>
      <option value="dashed">Dashed</option>
      <option value="dotted">Dotted</option>
    </select>


  <button
    class="delete-btn"
    (click)="deleteSelectedItem()"
  >
    Sil
  </button>
</div>

  <!-- NORMAL YAZI AYARLARI -->
  <div *ngIf="selectedItem.type !== 'Logo' && selectedItem.type !== 'Ürünler'">
  
    <label>Yazı Boyutu:</label>
    <input type="number" [(ngModel)]="selectedItem.fontSize">

    <label>Yazı Tipi:</label>
    <select [(ngModel)]="selectedItem.fontFamily">
      <option value="serif">Serif</option>
      <option value="sans-serif">Sans Serif</option>
      <option value="monospace">Monospace</option>
      <option value="cursive">Cursive</option>
    </select>

    <label>
      <input type="checkbox" [(ngModel)]="selectedItem.underline">
      Altı çizili
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="selectedItem.bold">
      Kalın
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="selectedItem.italic">
      İtalik
    </label>

    <label>Hizalama:</label>
    <select [(ngModel)]="selectedItem.align">
      <option value="left">Sol</option>
      <option value="center">Orta</option>
      <option value="right">Sağ</option>
    </select>

    <label>Yazı Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.color">

    <label>Arka Plan Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.backgroundColor">

    <label>Kenarlık Kalınlığı:</label>
    <input type="number" min="0" [(ngModel)]="selectedItem.borderWidth">

    <label>Kenarlık Rengi:</label>
    <input type="color" [(ngModel)]="selectedItem.borderColor">

    <label>Kenarlık Tipi:</label>
    <select [(ngModel)]="selectedItem.borderStyle">
      <option value="solid">Solid</option>
      <option value="dashed">Dashed</option>
      <option value="dotted">Dotted</option>
    </select>

    <button class="delete-btn" (click)="deleteSelectedItem()">Sil</button>
  </div>
</div>

<ng-template #noSelection>
  <p>Bileşen seçildiğinde ayarlar burada görünecek.</p>
</ng-template>
<!--*ngIf-> koşula göre göster/gizle
*ngFor-> diziyi dolaş
[(ngModel)]-> input ile değişkeni birbirine bağla
()->butona basınca TS fonksiyonunu çalıştır
(change)->dosya seçilince çalış
{{}}->TS dedki değeri HTML e yazdır-->
